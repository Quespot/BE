spring:
  application:
    name: quespot-backend

  datasource:
    url: jdbc:mysql://quespot-db.chgiecc0ipyi.ap-northeast-2.rds.amazonaws.com:3306/quespot?useSSL=false&serverTimezone=Asia/Seoul
    username: quespot
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

server:
  port: 8080

debug: false
